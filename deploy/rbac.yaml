---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pico-agent
  namespace: pico-agent
  labels:
    app.kubernetes.io/name: pico-agent
    app.kubernetes.io/component: service-account
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pico-agent
  labels:
    app.kubernetes.io/name: pico-agent
    app.kubernetes.io/component: rbac
rules:
  # PVC operations for resize
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # PV read access for status checking
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # StorageClass read access to check allowVolumeExpansion
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pico-agent
  labels:
    app.kubernetes.io/name: pico-agent
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pico-agent
subjects:
  - kind: ServiceAccount
    name: pico-agent
    namespace: pico-agent
